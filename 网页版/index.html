<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新生报到系统</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .header {
      width: 100%;
      padding: 60px 0;
      background: linear-gradient(135deg, #1890ff 0%, #096dd9 100%);
      text-align: center;
    }

    .title {
      font-size: 28px;
      font-weight: bold;
      color: #ffffff;
    }

    .content {
      margin-top: 40px;
      width: 100%;
      max-width: 400px;
      padding: 0 20px;
    }

    .form-container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-size: 14px;
      font-weight: 500;
    }

    .form-group input {
      width: 100%;
      height: 44px;
      padding: 0 12px;
      border: 1px solid #d9d9d9;
      border-radius: 8px;
      font-size: 16px;
      transition: all 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #1890ff;
      box-shadow: 0 0 0 2px rgba(24,144,255,0.2);
    }

    .form-group input.error {
      border-color: #f5222d;
    }

    .form-group input:disabled {
      background-color: #f5f5f5;
      cursor: not-allowed;
    }

    .error-message {
      color: #f5222d;
      font-size: 12px;
      margin-top: 4px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .register-btn {
      width: 100%;
      height: 50px;
      line-height: 50px;
      font-size: 18px;
      background-color: #1890ff;
      color: #ffffff;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
    }

    .register-btn:hover {
      background-color: #096dd9;
    }

    .register-btn:active {
      transform: scale(0.98);
    }

    .register-btn:disabled {
      background-color: #d9d9d9;
      cursor: not-allowed;
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      border-radius: 8px;
      display: none;
    }

    .result.show {
      display: block;
    }

    .result.success {
      background-color: #f6ffed;
      border: 1px solid #b7eb8f;
      color: #52c41a;
    }

    .result.error {
      background-color: #fff2f0;
      border: 1px solid #ffccc7;
      color: #f5222d;
    }

    .result-info {
      margin-top: 10px;
      padding: 15px;
      background: #f0f5ff;
      border-radius: 8px;
      border: 1px solid #adc6ff;
    }

    .result-info p {
      margin: 5px 0;
      color: #333;
      font-size: 14px;
    }

    .result-info strong {
      color: #1890ff;
    }

    .login-status {
      margin-bottom: 20px;
      padding: 10px 15px;
      background: #f6ffed;
      border: 1px solid #b7eb8f;
      border-radius: 8px;
      color: #52c41a;
      font-size: 14px;
      display: none;
    }

    .login-status.show {
      display: block;
    }

    .code-input-group {
      display: flex;
      gap: 10px;
    }

    .code-input-group input {
      flex: 1;
    }

    .code-btn {
      width: 120px;
      height: 44px;
      background-color: #1890ff;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s;
    }

    .code-btn:hover {
      background-color: #096dd9;
    }

    .code-btn:disabled {
      background-color: #d9d9d9;
      cursor: not-allowed;
    }

    .file-input-wrapper {
      position: relative;
      overflow: hidden;
      display: inline-block;
      width: 100%;
    }

    .file-input-wrapper input[type=file] {
      position: absolute;
      left: -9999px;
    }

    .file-input-label {
      display: block;
      width: 100%;
      height: 44px;
      line-height: 44px;
      text-align: center;
      background-color: #f0f5ff;
      border: 1px dashed #adc6ff;
      border-radius: 8px;
      color: #1890ff;
      cursor: pointer;
      transition: all 0.3s;
    }

    .file-input-label:hover {
      background-color: #e6f7ff;
    }

    .file-name {
      margin-top: 5px;
      font-size: 12px;
      color: #666;
    }

    .image-preview {
      margin-top: 10px;
      max-width: 100%;
      max-height: 200px;
      border-radius: 8px;
      display: none;
    }

    .image-preview.show {
      display: block;
    }

    .info-message {
      margin-top: 5px;
      font-size: 12px;
      color: #1890ff;
      display: none;
    }

    .info-message.show {
      display: block;
    }

    .label-hint {
      color: #1890ff;
      font-size: 12px;
      font-weight: normal;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1 class="title">欢迎使用新生报到系统</h1>
  </div>

  <div class="content">
    <!-- 登录页面 -->
    <div id="loginPage" class="form-container">
      <h2 style="text-align: center; margin-bottom: 20px; color: #333;">手机号验证</h2>
      
      <div class="form-group">
        <label for="loginPhoneInput">手机号</label>
        <input type="tel" id="loginPhoneInput" placeholder="请输入手机号" maxlength="11">
        <div class="error-message" id="loginPhoneError">请输入正确的手机号</div>
      </div>

      <div class="form-group">
        <label for="codeInput">验证码</label>
        <div class="code-input-group">
          <input type="text" id="codeInput" placeholder="请输入验证码" maxlength="4">
          <button class="code-btn" id="sendCodeBtn" onclick="handleSendCode()">发送验证码</button>
        </div>
        <div class="error-message" id="codeError">验证码不能为空</div>
      </div>

      <button class="register-btn" id="loginBtn" onclick="handleLogin()">
        验证并登录
      </button>

      <div class="result" id="loginResult"></div>
    </div>

    <!-- 报到页面 -->
    <div id="registerPage" class="form-container hidden">
      <div class="login-status" id="loginStatus">
        已验证手机号：<span id="verifiedPhone"></span>
        <a href="#" onclick="handleLogout()" style="float: right; color: #1890ff;">退出登录</a>
      </div>

      <h2 style="text-align: center; margin-bottom: 20px; color: #333;">填写报到信息</h2>
      
      <div class="form-group">
        <label for="nameInput">姓名</label>
        <input type="text" id="nameInput" placeholder="请输入姓名">
        <div class="error-message" id="nameError">姓名不能为空</div>
      </div>

      <div class="form-group">
        <label for="studentIdInput">学号</label>
        <input type="text" id="studentIdInput" placeholder="请输入学号">
        <div class="error-message" id="studentIdError">学号不能为空</div>
      </div>

      <div class="form-group">
        <label for="phoneInput">手机号</label>
        <input type="tel" id="phoneInput" placeholder="请输入手机号" maxlength="11" disabled>
        <div class="error-message" id="phoneError">请输入正确的手机号</div>
      </div>

      <div class="form-group">
        <label>身份证正面照片 <span class="label-hint">（带人像的一面）</span></label>
        <div class="file-input-wrapper">
          <input type="file" id="idCardPhotoFront" accept="image/jpeg,image/png,image/jpg" onchange="handleFileChange(event, 'front')">
          <label for="idCardPhotoFront" class="file-input-label">点击选择身份证正面照片</label>
        </div>
        <div class="file-name" id="fileNameFront"></div>
        <img id="imagePreviewFront" class="image-preview" alt="正面预览">
        <div class="error-message" id="photoErrorFront">请上传身份证正面照片</div>
        <div class="info-message" id="photoInfoFront"></div>
      </div>

      <div class="form-group">
        <label>身份证反面照片 <span class="label-hint">（带国徽的一面）</span></label>
        <div class="file-input-wrapper">
          <input type="file" id="idCardPhotoBack" accept="image/jpeg,image/png,image/jpg" onchange="handleFileChange(event, 'back')">
          <label for="idCardPhotoBack" class="file-input-label">点击选择身份证反面照片</label>
        </div>
        <div class="file-name" id="fileNameBack"></div>
        <img id="imagePreviewBack" class="image-preview" alt="反面预览">
        <div class="error-message" id="photoErrorBack">请上传身份证反面照片</div>
        <div class="info-message" id="photoInfoBack"></div>
      </div>

      <button class="register-btn" id="registerBtn" onclick="handleRegister()">
        提交报到
      </button>

      <div class="result" id="result"></div>
      <div class="result-info" id="resultInfo" style="display: none;"></div>
    </div>
  </div>

  <script>
    let isLoading = false;
    let countdown = 0;
    let selectedFileFront = null;
    let selectedFileBack = null;

    // 页面加载时检查登录状态
    window.onload = async function() {
      await checkLoginStatus();
    };

    async function checkLoginStatus() {
      try {
        const response = await fetch('http://127.0.0.1:8000/api/check_login/');
        const data = await response.json();
        
        if (data.is_logged_in) {
          showRegisterPage(data.phone);
        } else {
          showLoginPage();
        }
      } catch (error) {
        showLoginPage();
      }
    }

    function showLoginPage() {
      document.getElementById('loginPage').classList.remove('hidden');
      document.getElementById('registerPage').classList.add('hidden');
    }

    function showRegisterPage(phone) {
      document.getElementById('loginPage').classList.add('hidden');
      document.getElementById('registerPage').classList.remove('hidden');
      document.getElementById('loginStatus').classList.add('show');
      document.getElementById('verifiedPhone').textContent = phone;
      document.getElementById('phoneInput').value = phone;
    }

    function clearErrors() {
      document.querySelectorAll('.error-message').forEach(el => el.classList.remove('show'));
      document.querySelectorAll('input').forEach(el => el.classList.remove('error'));
    }

    function showError(inputId, errorId, message) {
      const input = document.getElementById(inputId);
      const error = document.getElementById(errorId);
      if (input) input.classList.add('error');
      if (error) {
        error.textContent = message;
        error.classList.add('show');
      }
    }

    async function handleSendCode() {
      if (countdown > 0) return;

      const phone = document.getElementById('loginPhoneInput').value.trim();
      
      if (!phone || phone.length !== 11 || !/^\d+$/.test(phone)) {
        showError('loginPhoneInput', 'loginPhoneError', '请输入正确的手机号');
        return;
      }

      const btn = document.getElementById('sendCodeBtn');
      btn.disabled = true;

      try {
        const response = await fetch('http://127.0.0.1:8000/api/send_code/', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ phone: phone })
        });

        const data = await response.json();
        
        if (data.success) {
          startCountdown();
          showResult('loginResult', '验证码已发送，请查看控制台', true);
        } else {
          showResult('loginResult', data.message, false);
          btn.disabled = false;
        }
      } catch (error) {
        showResult('loginResult', '网络请求失败，请确保服务器正在运行', false);
        btn.disabled = false;
      }
    }

    function startCountdown() {
      countdown = 60;
      const btn = document.getElementById('sendCodeBtn');
      btn.textContent = `${countdown}秒后重试`;
      
      const timer = setInterval(() => {
        countdown--;
        if (countdown <= 0) {
          clearInterval(timer);
          btn.textContent = '发送验证码';
          btn.disabled = false;
        } else {
          btn.textContent = `${countdown}秒后重试`;
        }
      }, 1000);
    }

    async function handleLogin() {
      if (isLoading) return;

      clearErrors();

      const phone = document.getElementById('loginPhoneInput').value.trim();
      const code = document.getElementById('codeInput').value.trim();

      let hasError = false;

      if (!phone || phone.length !== 11 || !/^\d+$/.test(phone)) {
        showError('loginPhoneInput', 'loginPhoneError', '请输入正确的手机号');
        hasError = true;
      }

      if (!code) {
        showError('codeInput', 'codeError', '验证码不能为空');
        hasError = true;
      }

      if (hasError) return;

      const btn = document.getElementById('loginBtn');
      isLoading = true;
      btn.disabled = true;
      btn.textContent = '验证中...';

      try {
        const response = await fetch('http://127.0.0.1:8000/api/verify_code/', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            phone: phone,
            code: code
          })
        });

        const data = await response.json();
        
        if (data.success) {
          showResult('loginResult', '登录成功', true);
          setTimeout(() => {
            showRegisterPage(phone);
          }, 1000);
        } else {
          showResult('loginResult', data.message, false);
        }
      } catch (error) {
        showResult('loginResult', '网络请求失败，请确保服务器正在运行', false);
      } finally {
        isLoading = false;
        btn.disabled = false;
        btn.textContent = '验证并登录';
      }
    }

    // 计算文件的MD5哈希值
    async function getFileMD5(file) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = function(e) {
          const wordArray = CryptoJS.lib.WordArray.create(e.target.result);
          const hash = CryptoJS.MD5(wordArray).toString();
          resolve(hash);
        };
        reader.readAsArrayBuffer(file);
      });
    }

    // 检查两张图片是否为同一张
    async function checkImagesNotSame() {
      if (selectedFileFront && selectedFileBack) {
        const md5Front = await getFileMD5(selectedFileFront);
        const md5Back = await getFileMD5(selectedFileBack);
        
        if (md5Front === md5Back) {
          showError('idCardPhotoBack', 'photoErrorBack', '身份证正面和反面不能上传同一张图片');
          return false;
        }
      }
      return true;
    }

    function handleFileChange(event, type) {
      const file = event.target.files[0];
      if (file) {
        if (type === 'front') {
          selectedFileFront = file;
          document.getElementById('fileNameFront').textContent = file.name;
          
          // 显示预览
          const reader = new FileReader();
          reader.onload = function(e) {
            const preview = document.getElementById('imagePreviewFront');
            preview.src = e.target.result;
            preview.classList.add('show');
          };
          reader.readAsDataURL(file);
        } else if (type === 'back') {
          selectedFileBack = file;
          document.getElementById('fileNameBack').textContent = file.name;
          
          // 显示预览
          const reader = new FileReader();
          reader.onload = function(e) {
            const preview = document.getElementById('imagePreviewBack');
            preview.src = e.target.result;
            preview.classList.add('show');
          };
          reader.readAsDataURL(file);
        }
        
        // 如果两面都已选择，检查是否为同一张
        if (selectedFileFront && selectedFileBack) {
          checkImagesNotSame();
        }
      }
    }

    async function handleRegister() {
      if (isLoading) return;

      clearErrors();

      const name = document.getElementById('nameInput').value.trim();
      const studentId = document.getElementById('studentIdInput').value.trim();
      const phone = document.getElementById('phoneInput').value.trim();

      let hasError = false;

      if (!name) {
        showError('nameInput', 'nameError', '姓名不能为空');
        hasError = true;
      }

      if (!studentId) {
        showError('studentIdInput', 'studentIdError', '学号不能为空');
        hasError = true;
      }

      if (!selectedFileFront) {
        showError('idCardPhotoFront', 'photoErrorFront', '请上传身份证正面照片');
        hasError = true;
      }

      if (!selectedFileBack) {
        showError('idCardPhotoBack', 'photoErrorBack', '请上传身份证反面照片');
        hasError = true;
      }

      if (hasError) return;

      // 前端检查是否为同一张图片
      const imagesValid = await checkImagesNotSame();
      if (!imagesValid) {
        hasError = true;
      }

      if (hasError) return;

      const btn = document.getElementById('registerBtn');
      const result = document.getElementById('result');
      const resultInfo = document.getElementById('resultInfo');

      isLoading = true;
      btn.disabled = true;
      btn.textContent = '提交中...';
      result.className = 'result';
      result.textContent = '';
      resultInfo.style.display = 'none';

      // 使用 FormData 提交文件
      const formData = new FormData();
      formData.append('name', name);
      formData.append('student_id', studentId);
      formData.append('id_card_photo_front', selectedFileFront);
      formData.append('id_card_photo_back', selectedFileBack);

      try {
        const response = await fetch('http://127.0.0.1:8000/api/register_with_info_v3/', {
          method: 'POST',
          body: formData
        });

        const data = await response.json();
        
        if (data.success) {
          result.className = 'result show success';
          result.textContent = data.message;
          resultInfo.innerHTML = `
            <p><strong>姓名：</strong>${data.data.name}</p>
            <p><strong>学号：</strong>${data.data.student_id}</p>
            <p><strong>手机号：</strong>${data.data.phone}</p>
            <p><strong>报到时间：</strong>${data.data.register_time}</p>
          `;
          resultInfo.style.display = 'block';

          document.getElementById('nameInput').value = '';
          document.getElementById('studentIdInput').value = '';
          selectedFileFront = null;
          selectedFileBack = null;
          document.getElementById('fileNameFront').textContent = '';
          document.getElementById('fileNameBack').textContent = '';
          document.getElementById('imagePreviewFront').classList.remove('show');
          document.getElementById('imagePreviewBack').classList.remove('show');
        } else {
          result.className = 'result show error';
          result.textContent = data.message;
        }
      } catch (error) {
        result.className = 'result show error';
        result.textContent = '网络请求失败，请确保服务器正在运行';
      } finally {
        isLoading = false;
        btn.disabled = false;
        btn.textContent = '提交报到';
      }
    }

    async function handleLogout() {
      try {
        await fetch('http://127.0.0.1:8000/api/logout/');
        showLoginPage();
        document.getElementById('loginPhoneInput').value = '';
        document.getElementById('codeInput').value = '';
        clearErrors();
      } catch (error) {
        console.error('退出登录失败:', error);
      }
    }

    function showResult(elementId, message, isSuccess) {
      const result = document.getElementById(elementId);
      result.className = 'result show ' + (isSuccess ? 'success' : 'error');
      result.textContent = message;
    }
  </script>
</body>
</html>
