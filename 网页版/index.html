<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新生报到系统</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .header {
      width: 100%;
      padding: 60px 0;
      background: linear-gradient(135deg, #1890ff 0%, #096dd9 100%);
      text-align: center;
    }

    .title {
      font-size: 28px;
      font-weight: bold;
      color: #ffffff;
    }

    .content {
      margin-top: 40px;
      width: 100%;
      max-width: 400px;
      padding: 0 20px;
    }

    .form-container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-size: 14px;
      font-weight: 500;
    }

    .form-group input {
      width: 100%;
      height: 44px;
      padding: 0 12px;
      border: 1px solid #d9d9d9;
      border-radius: 8px;
      font-size: 16px;
      transition: all 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #1890ff;
      box-shadow: 0 0 0 2px rgba(24,144,255,0.2);
    }

    .form-group input.error {
      border-color: #f5222d;
    }

    .error-message {
      color: #f5222d;
      font-size: 12px;
      margin-top: 4px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .register-btn {
      width: 100%;
      height: 50px;
      line-height: 50px;
      font-size: 18px;
      background-color: #1890ff;
      color: #ffffff;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
    }

    .register-btn:hover {
      background-color: #096dd9;
    }

    .register-btn:active {
      transform: scale(0.98);
    }

    .register-btn:disabled {
      background-color: #d9d9d9;
      cursor: not-allowed;
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      border-radius: 8px;
      display: none;
    }

    .result.show {
      display: block;
    }

    .result.success {
      background-color: #f6ffed;
      border: 1px solid #b7eb8f;
      color: #52c41a;
    }

    .result.error {
      background-color: #fff2f0;
      border: 1px solid #ffccc7;
      color: #f5222d;
    }

    .result-info {
      margin-top: 10px;
      padding: 15px;
      background: #f0f5ff;
      border-radius: 8px;
      border: 1px solid #adc6ff;
    }

    .result-info p {
      margin: 5px 0;
      color: #333;
      font-size: 14px;
    }

    .result-info strong {
      color: #1890ff;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1 class="title">欢迎使用新生报到系统</h1>
  </div>

  <div class="content">
    <div class="form-container">
      <div class="form-group">
        <label for="nameInput">姓名</label>
        <input type="text" id="nameInput" placeholder="请输入姓名">
        <div class="error-message" id="nameError">姓名不能为空</div>
      </div>

      <div class="form-group">
        <label for="studentIdInput">学号</label>
        <input type="text" id="studentIdInput" placeholder="请输入学号">
        <div class="error-message" id="studentIdError">学号不能为空</div>
      </div>

      <div class="form-group">
        <label for="phoneInput">手机号</label>
        <input type="tel" id="phoneInput" placeholder="请输入手机号" maxlength="11">
        <div class="error-message" id="phoneError">请输入正确的手机号</div>
      </div>

      <button class="register-btn" id="registerBtn" onclick="handleRegister()">
        提交报到
      </button>

      <div class="result" id="result"></div>
      <div class="result-info" id="resultInfo" style="display: none;"></div>
    </div>
  </div>

  <script>
    let isLoading = false;

    function clearErrors() {
      document.querySelectorAll('.error-message').forEach(el => el.classList.remove('show'));
      document.querySelectorAll('input').forEach(el => el.classList.remove('error'));
    }

    function showError(inputId, errorId, message) {
      const input = document.getElementById(inputId);
      const error = document.getElementById(errorId);
      input.classList.add('error');
      error.textContent = message;
      error.classList.add('show');
    }

    async function handleRegister() {
      if (isLoading) {
        return;
      }

      clearErrors();

      const name = document.getElementById('nameInput').value.trim();
      const studentId = document.getElementById('studentIdInput').value.trim();
      const phone = document.getElementById('phoneInput').value.trim();

      let hasError = false;

      if (!name) {
        showError('nameInput', 'nameError', '姓名不能为空');
        hasError = true;
      }

      if (!studentId) {
        showError('studentIdInput', 'studentIdError', '学号不能为空');
        hasError = true;
      }

      if (!phone) {
        showError('phoneInput', 'phoneError', '手机号不能为空');
        hasError = true;
      } else if (phone.length !== 11 || !/^\d+$/.test(phone)) {
        showError('phoneInput', 'phoneError', '手机号格式不正确');
        hasError = true;
      }

      if (hasError) {
        return;
      }

      const btn = document.getElementById('registerBtn');
      const result = document.getElementById('result');
      const resultInfo = document.getElementById('resultInfo');

      isLoading = true;
      btn.disabled = true;
      btn.textContent = '提交中...';
      result.className = 'result';
      result.textContent = '';
      resultInfo.style.display = 'none';

      try {
        const response = await fetch('http://127.0.0.1:8000/api/register_with_info/', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            name: name,
            student_id: studentId,
            phone: phone
          })
        });

        const data = await response.json();
        
        if (data.success) {
          result.className = 'result show success';
          result.textContent = data.message;
          resultInfo.innerHTML = `
            <p><strong>姓名：</strong>${data.data.name}</p>
            <p><strong>学号：</strong>${data.data.student_id}</p>
            <p><strong>手机号：</strong>${data.data.phone}</p>
            <p><strong>报到时间：</strong>${data.data.register_time}</p>
          `;
          resultInfo.style.display = 'block';

          document.getElementById('nameInput').value = '';
          document.getElementById('studentIdInput').value = '';
          document.getElementById('phoneInput').value = '';
        } else {
          result.className = 'result show error';
          result.textContent = data.message;
        }
      } catch (error) {
        result.className = 'result show error';
        result.textContent = '网络请求失败，请确保服务器正在运行';
      } finally {
        isLoading = false;
        btn.disabled = false;
        btn.textContent = '提交报到';
      }
    }
  </script>
</body>
</html>
